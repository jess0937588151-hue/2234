<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>大王雞美式炸雞 POS V2.1.23</title>
  <link rel="manifest" href="manifest.webmanifest"/>
  <link rel="apple-touch-icon" href="assets/icon-192.png"/>
  <link rel="stylesheet" href="styles/base.css"/>
  <link rel="stylesheet" href="styles/layout.css"/>
  <link rel="stylesheet" href="styles/pos.css"/>
</head>
<body>
<div id="app">

  <header class="topbar">
    <h1>大王雞美式炸雞 POS V2.1.23</h1>
    <nav class="main-nav">
      <button class="nav-btn active" data-view="posView">點餐</button>
      <button class="nav-btn" data-view="ordersView">訂單查詢</button>
      <button class="nav-btn" data-view="reportsView">報表</button>
      <button class="nav-btn" data-view="productsView">商品管理</button>
      <button class="nav-btn" data-view="settingsView">設定</button>
    </nav>
  </header>

  <!-- ===== 點餐 ===== -->
  <section id="posView" class="view active">
    <div id="categoryTabs" class="category-tabs"></div>
    <div id="productGrid" class="product-grid"></div>
    <div class="cart-section">
      <div class="row between"><h2>購物車</h2><button id="clearCartBtn" class="danger-btn small">清空</button></div>
      <div id="cartItems" class="cart-items">尚未加入商品</div>
      <div class="cart-summary">
        <div class="row between"><span>小計</span><span id="cartSubtotal">$0</span></div>
        <div class="discount-section">
          <label><b>折扣類型</b></label>
          <div class="discount-toggle">
            <button id="discountTypeAmount" class="toggle-btn active">金額折扣</button>
            <button id="discountTypePercent" class="toggle-btn">百分比折扣</button>
          </div>
          <label><b>折扣值</b></label>
          <input type="number" id="discountValue" value="0" min="0"/>
        </div>
        <div class="row between"><span>折扣後</span><span id="cartTotal">$0</span></div>
      </div>
      <div class="cart-actions">
        <button id="printCustomerBtn" class="primary-btn full">列印顧客單</button>
        <button id="printKitchenBtn" class="secondary-btn full">列印廚房單</button>
        <button id="checkoutBtn" class="success-btn full">結帳</button>
      </div>
    </div>
  </section>

  <!-- ===== 訂單查詢 ===== -->
  <section id="ordersView" class="view">
    <h2>訂單查詢</h2>
    <div class="order-filters">
      <div class="row gap wrap">
        <input type="date" id="orderDateFrom"/>
        <span>～</span>
        <input type="date" id="orderDateTo"/>
        <input type="text" id="orderSearchKey" placeholder="單號／商品名"/>
        <button id="orderSearchBtn" class="primary-btn">搜尋</button>
        <button id="orderResetBtn" class="secondary-btn">重置</button>
      </div>
      <div class="row gap wrap" style="margin-top:8px">
        <button class="filter-btn active" data-status="all">全部</button>
        <button class="filter-btn" data-status="completed">已完成</button>
        <button class="filter-btn" data-status="pending">待付款</button>
      </div>
    </div>
    <div id="orderList" class="order-list"></div>
  </section>

  <!-- ===== 報表 ===== -->
  <section id="reportsView" class="view">
    <h2>報表</h2>
    <div class="row gap wrap" style="margin-bottom:12px">
      <button id="exportTodayBtn" class="secondary-btn">匯出今日 CSV</button>
      <button id="printReportBtn" class="primary-btn">列印報表</button>
    </div>
    <div id="reportContent" class="report-content"></div>
  </section>

  <!-- ===== 商品管理 ===== -->
  <section id="productsView" class="view">
    <h2>商品管理</h2>
    <div id="productsTableWrap"></div>
    <hr/>
    <h3>新增／編輯商品</h3>
    <form id="productForm" class="product-form">
      <label>商品名稱 <input type="text" id="pfName" required/></label>
      <label>價格 <input type="number" id="pfPrice" min="0" required/></label>
      <label>分類
        <select id="pfCategory"><option value="">未分類</option></select>
      </label>
      <label>排序 <input type="number" id="pfSort" value="0"/></label>
      <label>商品圖片
        <input type="file" id="pfImage" accept="image/*"/>
      </label>
      <div id="pfImagePreview" style="margin:4px 0"></div>
      <label>啟用 <input type="checkbox" id="pfEnabled" checked/></label>
      <input type="hidden" id="pfId"/>
      <div class="row gap">
        <button type="submit" class="primary-btn">儲存商品</button>
        <button type="button" id="pfCancelBtn" class="secondary-btn">取消</button>
      </div>
    </form>
    <hr/>
    <div class="row gap wrap">
      <button id="manageCategoriesBtn" class="secondary-btn">管理分類</button>
      <button id="manageModulesBtn" class="secondary-btn">管理加料模組</button>
    </div>
    <hr/>
    <h3>待上架菜單</h3>
    <div id="pendingMenuList"></div>
  </section>

  <!-- ===== 設定 ===== -->
  <section id="settingsView" class="view">
    <h2>設定</h2>

    <fieldset><legend>本機資料</legend>
      <div class="row gap wrap">
        <button id="exportJsonBtn" class="secondary-btn">匯出 JSON</button>
        <button id="importJsonBtn" class="secondary-btn">匯入 JSON</button>
        <input type="file" id="importJsonFile" accept=".json" class="hidden"/>
        <button id="seedDemoBtn" class="danger-btn">重建預設資料</button>
      </div>
      <label style="margin-top:8px"><input type="checkbox" id="showProductImageToggle"/> 點餐頁顯示商品圖片</label>
    </fieldset>

    <fieldset><legend>Google Drive 備份／還原</legend>
      <label>Google OAuth Client ID<input type="text" id="googleClientId" placeholder="貼上 Google OAuth Client ID"/></label>
      <label>Google Drive 資料夾 ID（可留空，留空則存到根目錄）<input type="text" id="googleFolderId" placeholder="可留空"/></label>
      <label><input type="checkbox" id="autoBackupEnabled"/> 啟用定期自動備份</label>
      <label>定期備份分鐘數<input type="number" id="autoBackupInterval" value="60" min="1"/></label>
      <div class="row gap wrap" style="margin-top:8px">
        <button id="saveGoogleSettingsBtn" class="primary-btn">儲存 Google 設定</button>
        <button id="googleLoginBtn" class="secondary-btn">登入 Google</button>
        <button id="googleLogoutBtn" class="secondary-btn">登出 Google</button>
        <button id="manualBackupBtn" class="secondary-btn">立即備份</button>
        <button id="manualRestoreBtn" class="secondary-btn">從 Google Drive 還原</button>
      </div>
      <div id="googleBackupStatus" style="margin-top:8px;font-size:13px;color:#666"></div>
    </fieldset>

    <fieldset><legend>即時接單設定（Firebase）</legend>
      <div id="realtimeOrderPanel"></div>
    </fieldset>

    <fieldset><legend>列印設定</legend>
      <label>店名<input type="text" id="printStoreName" placeholder="店名"/></label>
      <label>電話<input type="text" id="printPhone" placeholder="電話"/></label>
      <label>地址<input type="text" id="printAddress" placeholder="地址"/></label>
      <label>收據備註<input type="text" id="printNote" placeholder="收據備註"/></label>
      <label>收據紙寬 (mm)<input type="number" id="printPaperWidth" value="80"/></label>
      <label>標籤尺寸 (mm) 寬x高<input type="text" id="printLabelSize" placeholder="50x30"/></label>
      <label>字體大小 (px)<input type="number" id="printFontSize" value="14"/></label>
      <label>水平偏移 (mm)<input type="number" id="printOffsetX" value="0"/></label>
      <label>垂直偏移 (mm)<input type="number" id="printOffsetY" value="0"/></label>
      <label>廚房單份數<input type="number" id="printKitchenCopies" value="1" min="1"/></label>
      <label><input type="checkbox" id="autoPrintAfterCheckout"/> 結帳後自動列印</label>
      <label><input type="checkbox" id="autoPrintKitchen"/> 接單後自動列印廚房單</label>
      <div class="row gap wrap" style="margin-top:8px">
        <button id="savePrintSettingsBtn" class="primary-btn">儲存列印設定</button>
        <button id="printPreviewBtn" class="secondary-btn">列印預覽</button>
        <button id="selectPrintFieldsBtn" class="secondary-btn">選擇列印欄位</button>
      </div>
    </fieldset>

    <fieldset><legend>自訂進單提示音</legend>
      <p style="font-size:13px;color:#666">上傳音檔（≤500KB，.mp3/.wav/.m4a）取代預設三聲提示音。音檔存於瀏覽器本機，換裝置需重新上傳。</p>
      <input type="file" id="customSoundFile" accept=".mp3,.wav,.m4a" class="hidden"/>
      <div class="row gap wrap" style="margin-top:8px">
        <button id="uploadSoundBtn" class="secondary-btn">上傳音檔</button>
        <button id="previewSoundBtn" class="secondary-btn">試聽</button>
        <button id="removeSoundBtn" class="danger-btn small">移除自訂音</button>
      </div>
      <div id="customSoundStatus" style="margin-top:6px;font-size:13px;color:#666">尚未上傳自訂音檔</div>
    </fieldset>
  </section>

</div><!-- end #app -->

<!-- ===== Modals ===== -->

<!-- 商品設定 Modal -->
<div id="productConfigModal" class="modal hidden">
  <div class="modal-backdrop" data-close="product-config"></div>
  <div class="modal-dialog">
    <div class="row between wrap"><h2 id="productConfigTitle">商品加料</h2><button id="closeProductConfig" class="ghost-btn">✕</button></div>
    <div id="productConfigBody"></div>
    <div class="row gap" style="margin-top:12px">
      <button id="productConfigConfirm" class="primary-btn">確認加入</button>
      <button id="productConfigCancel" class="secondary-btn">取消</button>
    </div>
  </div>
</div>

<!-- 分類管理 Modal -->
<div id="categoryModal" class="modal hidden">
  <div class="modal-backdrop" data-close="category"></div>
  <div class="modal-dialog">
    <div class="row between wrap"><h2>分類管理</h2><button id="closeCategoryModal" class="ghost-btn">✕</button></div>
    <div class="row gap" style="margin:8px 0">
      <input type="text" id="newCategoryName" placeholder="新分類名稱"/>
      <button id="addCategoryBtn" class="primary-btn">新增</button>
    </div>
    <div id="categoryList"></div>
  </div>
</div>

<!-- 模組管理 Modal -->
<div id="moduleModal" class="modal hidden">
  <div class="modal-backdrop" data-close="module"></div>
  <div class="modal-dialog" style="max-width:600px">
    <div class="row between wrap"><h2>加料模組管理</h2><button id="closeModuleModal" class="ghost-btn">✕</button></div>
    <div id="moduleLibrary"></div>
    <hr/>
    <h3>新增模組</h3>
    <div class="row gap wrap">
      <input type="text" id="newModuleName" placeholder="模組名稱"/>
      <button id="addModuleBtn" class="primary-btn">新增模組</button>
    </div>
    <div id="moduleEditor" style="margin-top:8px"></div>
  </div>
</div>

<!-- 模組指派 Modal -->
<div id="moduleManageModal" class="modal hidden">
  <div class="modal-backdrop" data-close="module-manage"></div>
  <div class="modal-dialog">
    <div class="row between wrap"><h2 id="moduleManageTitle">指派模組</h2><button id="closeModuleManage" class="ghost-btn">✕</button></div>
    <input type="text" id="moduleManageSearch" placeholder="搜尋商品..." style="margin:8px 0;width:100%"/>
    <div id="moduleManageList"></div>
    <div class="row gap" style="margin-top:12px">
      <button id="saveModuleManage" class="primary-btn">儲存</button>
      <button id="cancelModuleManage" class="secondary-btn">取消</button>
    </div>
  </div>
</div>

<!-- 報表列印選項 Modal -->
<div id="reportPrintModal" class="modal hidden">
  <div class="modal-backdrop" data-close="report-print"></div>
  <div class="modal-dialog" style="max-width:460px">
    <div class="row between wrap"><h2>選擇要列印的報表</h2><button id="closeReportPrintModal" class="ghost-btn">✕</button></div>
    <div class="stack" style="margin-top:12px">
      <label class="inline-check"><input type="checkbox" id="rp_summary" checked/> 營業額摘要（今日／近7日／近30日）</label>
      <label class="inline-check"><input type="checkbox" id="rp_topProducts" checked/> 熱銷商品 TOP 10</label>
      <label class="inline-check"><input type="checkbox" id="rp_paymentStats" checked/> 付款方式統計</label>
      <label class="inline-check"><input type="checkbox" id="rp_productAnalysis" checked/> 商品販賣分析</label>
      <label class="inline-check"><input type="checkbox" id="rp_hourAnalysis" checked/> 時段販售狀況</label>
      <label class="inline-check"><input type="checkbox" id="rp_sessionList" checked/> 開始／結束紀錄</label>
    </div>
    <div class="row gap wrap" style="margin-top:16px">
      <button id="reportPrintConfirmBtn" class="primary-btn">確認列印</button>
      <button id="reportPrintCancelBtn" class="secondary-btn">取消</button>
    </div>
  </div>
</div>

<!-- 列印欄位選擇 Modal -->
<div id="printFieldModal" class="modal hidden">
  <div class="modal-backdrop" data-close="print-field"></div>
  <div class="modal-dialog" style="max-width:460px">
    <div class="row between wrap"><h2>選擇列印欄位</h2><button id="closePrintFieldModal" class="ghost-btn">✕</button></div>
    <div id="printFieldList" class="stack" style="margin-top:12px"></div>
    <div class="row gap" style="margin-top:16px">
      <button id="savePrintFieldsBtn" class="primary-btn">儲存</button>
      <button id="cancelPrintFieldsBtn" class="secondary-btn">取消</button>
    </div>
  </div>
</div>

<!-- 列印預覽 Modal -->
<div id="printPreviewModal" class="modal hidden">
  <div class="modal-backdrop" data-close="print-preview"></div>
  <div class="modal-dialog" style="max-width:420px">
    <div class="row between wrap"><h2>列印預覽</h2><button id="closePrintPreview" class="ghost-btn">✕</button></div>
    <div id="printPreviewBody" style="margin-top:8px;border:1px solid #ccc;padding:12px;background:#fff;max-height:60vh;overflow:auto"></div>
    <div class="row gap" style="margin-top:12px">
      <button id="printPreviewPrintBtn" class="primary-btn">列印</button>
      <button id="printPreviewCloseBtn" class="secondary-btn">關閉</button>
    </div>
  </div>
</div>

<!-- 付款方式 Modal -->
<div id="paymentModal" class="modal hidden">
  <div class="modal-backdrop" data-close="payment"></div>
  <div class="modal-dialog" style="max-width:360px">
    <div class="row between wrap"><h2>選擇付款方式</h2><button id="closePaymentModal" class="ghost-btn">✕</button></div>
    <div class="stack" style="margin-top:12px">
      <button class="pay-btn primary-btn full" data-method="cash">現金</button>
      <button class="pay-btn secondary-btn full" data-method="linepay">LINE Pay</button>
      <button class="pay-btn secondary-btn full" data-method="credit">信用卡</button>
      <button class="pay-btn warning-btn full" data-method="pending">先出單（待付款）</button>
    </div>
  </div>
</div>

<!-- 外部腳本 -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
