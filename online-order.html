<!doctype html>
<!-- 中文備註：給外部顧客直接使用的線上點餐頁面。 -->
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>線上點餐</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/online-order.css" />
</head>
<body>
  <header class="online-hero">
    <div>
      <div class="online-badge">線上點餐</div>
      <h1 id="onlineStoreName">立即點餐</h1>
      <p id="onlineStoreMeta" class="muted">外帶 / 外送皆可</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button id="openMyOrdersBtn" class="secondary-btn">📋 我的訂單</button>
      <button id="openCartBtn" class="primary-btn online-cart-btn">購物車 <span id="cartQtyBadge">0</span></button>
    </div>
  </header>

  <main class="online-layout">
    <aside class="online-left stack">
      <section class="card stack">
        <label>搜尋商品
          <input id="onlineSearchInput" placeholder="搜尋品項">
        </label>
        <div id="onlineCategoryTabs" class="online-category-tabs"></div>
      </section>
    </aside>

    <section class="online-right">
      <div id="onlineProductGrid" class="online-product-grid"></div>
    </section>
  </main>

    <div id="onlineCartDrawer" class="online-drawer hidden">
    <div class="online-drawer-backdrop"></div>
    <div class="online-drawer-panel">
      <!-- v20260603-v2：只「送出訂單」固定在底，其餘全部可捲動 -->
      <div class="row between wrap" style="flex:0 0 auto">
        <h2>購物車</h2>
        <button id="closeCartBtn" class="ghost-btn">✕</button>
      </div>

      <!-- 可捲動區（餐點 + 顧客資訊 + 金額 + 點數 + 優惠碼），送出鈕不在這裡面 -->
      <div id="onlineDrawerScroll" style="flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch">
        <!-- 餐點內容（不動） -->
        <div id="onlineCartList" class="stack"></div>

        <!-- 顧客資訊 -->
        <section class="card stack">
          <h2>顧客資訊</h2>
          <!-- v20260603-v2：訂單類型左右兩欄（左=類型，右=預約時段，選預約才顯示） -->
          <div style="display:flex;gap:8px;">
            <label style="flex:1;">訂單類型
              <select id="onlineOrderType">
                <option value="外帶">外帶</option>
                <option value="內用">內用</option>
                <option value="預約">預約</option>
              </select>
            </label>
            <label style="flex:1;" id="onlineReservationBlock" style="display:none">選擇預約取餐時間
              <select id="onlineReservationSlot" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px">
                <option value="">請選擇時段</option>
              </select>
            </label>
          </div>
          <div id="onlineReservationHint" class="muted" style="font-size:12px;margin-top:-4px;display:none">起始時間為 1 小時後，每 15 分鐘一個區間，可預約至 2 天內。</div>

          <!-- 姓名/電話（不動） -->
          <div style="display:flex;gap:8px;">
            <label style="flex:1;">姓名
              <input id="onlineCustomerName" placeholder="請輸入姓名">
            </label>
            <label style="flex:1;">電話
              <input id="onlineCustomerPhone" placeholder="請輸入電話">
            </label>
          </div>

          <!-- v20260603-v2：顧客備註縮成一列 -->
          <label>顧客備註
            <input id="onlineCustomerNote" placeholder="例如：晚點取餐、餐具需求、桌號">
          </label>
        </section>

        <div class="online-summary">
          <!-- v20260603-v2：小計 + 總數量同一列 -->
          <div class="row between">
            <span>小計 <strong id="onlineSubtotalText">0</strong></span>
            <span>總數量 <strong id="onlineTotalQtyText">0</strong></span>
          </div>

          <!-- 優惠碼區由 promotion-ui.js 動態插在 #onlinePointsRow 之前（見 JS） -->

          <!-- v20260603-v2：點數列（左=目前點數，右=折抵點數輸入） -->
          <div id="onlinePointsRow" class="row between" style="margin-top:8px;align-items:center">
            <span>目前點數 <strong id="onlinePointsBalanceText">—</strong></span>
            <span style="display:flex;align-items:center;gap:6px">折抵
              <input id="onlinePointsUseInput" type="number" min="0" inputmode="numeric" placeholder="0" style="width:84px;padding:6px;border:1px solid #cbd5e1;border-radius:6px;text-align:right">
            </span>
          </div>

          <!-- v20260603-v2：折扣金額（左） + 本次可得點數（右） -->
          <div class="row between" style="margin-top:6px">
            <span>折扣 <strong id="onlineDiscountSummaryText" style="color:#16a34a">-0</strong></span>
            <span>本次可得點數 <strong id="onlineRewardPointsText" style="color:#f59e0b">0</strong></span>
          </div>

                    <!-- 應付合計（單一列） -->
          <div class="row between" style="margin-top:6px;font-weight:700;border-top:1px dashed #cbd5e1;padding-top:8px">
            <span>應付合計</span>
            <span id="onlineGrandTotalSummaryText" style="color:#dc2626">0</span>
          </div>

          <!-- v20260603-v3：付款別兩顆鈕移進捲動區（只剩送出鈕固定） -->
          <div style="display:flex;gap:8px;margin-top:12px">
            <button type="button" id="onlinePayCash" class="pay-method-btn" data-pay="現金" style="flex:1;padding:12px;border:2px solid #cbd5e1;border-radius:10px;background:#fff;font-weight:700;cursor:pointer">現金</button>
            <button type="button" id="onlinePayEpay" class="pay-method-btn" data-pay="電子支付" style="flex:1;padding:12px;border:2px solid #cbd5e1;border-radius:10px;background:#fff;font-weight:700;cursor:pointer">電子支付</button>
          </div>
        </div>
      </div>


            <!-- v20260603-v3：只「送出訂單」固定在底 -->
      <div style="flex:0 0 auto;padding-top:10px;border-top:1px solid #e2e8f0;background:#fff">
        <button id="submitOnlineOrderBtn" class="primary-btn full">送出訂單</button>
      </div>

    </div>
  </div>


  <div id="onlineProductModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-dialog wide">
      <div class="row between wrap">
        <h2 id="onlineModalTitle">商品設定</h2>
        <button id="closeOnlineProductModal" class="ghost-btn">✕</button>
      </div>
      <div id="onlineModalImageWrap" class="online-modal-image hidden"></div>
      <div id="onlineModalModules" class="stack"></div>
      <div class="stack">
        <div>
          <label>商品備註</label>
          <input id="onlineItemNoteInput" placeholder="例如：不要胡椒、先做">
        </div>
        <div class="grid2">
          <div>
            <label>數量</label>
            <input id="onlineItemQtyInput" type="number" min="1" value="1">
          </div>
          <div class="muted" id="onlineItemPricePreview" style="align-self:end;padding-bottom:12px">小計：0</div>
        </div>
      </div>
      <div class="row between wrap">
        <button id="saveOnlineProductBtn" class="primary-btn">加入購物車</button>
        <button id="cancelOnlineProductBtn" class="secondary-btn">取消</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/pages/online-order-page.js"></script>

  <div id="onlineOrderStatusOverlay" class="online-status-overlay hidden">
    <div class="online-status-card">
      <div class="online-badge">訂單處理中</div>
      <h2 id="onlineOrderStatusTitle">等待店家確認訂單</h2>
      <p id="onlineOrderStatusText" class="muted">送出後請稍候，店家確認後才算完成訂購。</p>
      <button id="closeOnlineStatusBtn" class="secondary-btn hidden">關閉</button>
    </div>
  </div>

  <!-- 我的訂單查詢 modal -->
  <div id="myOrdersModal" class="modal hidden">
    <div class="modal-backdrop" onclick="document.getElementById('myOrdersModal').classList.add('hidden');"></div>
    <div class="modal-dialog" style="max-width:520px;max-height:90vh;display:flex;flex-direction:column">
      <div class="row between wrap">
        <h2>📋 我的訂單查詢</h2>
        <button id="closeMyOrdersBtn" class="ghost-btn">✕</button>
      </div>
      <div class="stack" style="margin-top:8px">
        <label>姓名
          <input id="myOrdersNameInput" placeholder="請輸入完整姓名">
        </label>
        <label>電話
          <input id="myOrdersPhoneInput" placeholder="請輸入完整電話" inputmode="tel">
        </label>
        <button id="myOrdersSearchBtn" class="primary-btn">查詢我的訂單</button>
        <div id="myOrdersHint" class="muted" style="font-size:12px">
          請輸入訂購時填寫的完整姓名與電話。為避免濫用，每 30 秒只能查詢一次。
        </div>
      </div>
      <div id="myOrdersResult" class="stack" style="margin-top:12px;overflow-y:auto;flex:1"></div>
    </div>
  </div>

</body>
</html>
