<html><body>
<pre id="out">載入中…</pre>
<script type="module">
import { state } from './js/core/store.js';
window.state = state;
const out = document.getElementById('out');
out.textContent = JSON.stringify({

  categoriesType: Array.isArray(state.categories) ? 'array' : typeof state.categories,
  firstCategory: state.categories?.[0],

  firstModule: state.modules?.[0],

  firstProduct: state.products?.[0]
}, null, 2);
